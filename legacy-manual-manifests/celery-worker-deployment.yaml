apiVersion: apps/v1
kind: Deployment
metadata:
  name: profileforge-celery-worker
  namespace: profileforge-dev
  labels:
    app: profileforge-celery-worker

spec:
  replicas: 1

  selector:
    matchLabels:
      app: profileforge-celery-worker

  template:
    metadata:
      labels:
        app: profileforge-celery-worker

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: celery-worker
          image: profileforge-backend:local
          imagePullPolicy: IfNotPresent

          command:
            - celery

          args:
            - -A
            - config.celery_app
            - worker
            - -l
            - info
            - --concurrency=2

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings.production"

            - name: DEBUG
              value: "False"

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: secret-key

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-url

            - name: REDIS_URL
              value: "redis://redis:6379"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "celery -A config.celery_app inspect ping -d celery@$HOSTNAME"

            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "celery -A config.celery_app inspect ping -d celery@$HOSTNAME"

            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
